<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;background:#111;font-family:monospace;color:#eee}
  #grid{display:flex;flex-wrap:wrap;gap:6px;padding:8px}
  .tile{width:230px;background:#1a1a1a;border:1px solid #333;border-radius:6px}
  .tile img{width:230px;height:230px;display:block;background:#0c0c14}
  .tile .lbl{padding:5px 8px;font-size:12px;color:#7cf}
  .tile .lbl b{color:#fff}
</style>
<script type="importmap">{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}</script>
</head><body>
<div id="grid"></div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

const MODELS = new URLSearchParams(location.search).get('models').split(',');
const S = 560;
const renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true, alpha:true});
renderer.setSize(S, S);
const pmrem = new THREE.PMREMGenerator(renderer);
const envTex = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
const loader = new GLTFLoader();
const draco = new DRACOLoader(); draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
loader.setDRACOLoader(draco); loader.setMeshoptDecoder(MeshoptDecoder);

// 3/4 hero view — front/back obvious (headlights, windshield). Arrows show axes.
const cam = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
cam.position.set(3.0, 2.2, 3.4); cam.up.set(0,1,0); cam.lookAt(0,0.2,0);

function axisArrows(){
  const g = new THREE.Group();
  // green = +Z (screen UP), red = +X (screen RIGHT)
  const mk=(dir,col)=>{const a=new THREE.ArrowHelper(dir,new THREE.Vector3(0,0.2,0),1.35,col,0.35,0.22);g.add(a);};
  mk(new THREE.Vector3(0,0,1),0x22ff66);
  mk(new THREE.Vector3(1,0,0),0xff4444);
  return g;
}
function fit(obj){
  obj.updateMatrixWorld(true);
  const box=new THREE.Box3().setFromObject(obj);
  const size=box.getSize(new THREE.Vector3()), ctr=box.getCenter(new THREE.Vector3());
  const ref=Math.max(size.x,size.z)||1;
  obj.position.set(-ctr.x,-box.min.y,-ctr.z);
  const grp=new THREE.Group(); grp.add(obj); grp.scale.setScalar(2.4/ref);
  return grp;
}
async function shoot(file, yaw){
  const scene=new THREE.Scene(); scene.environment=envTex;
  scene.add(new THREE.HemisphereLight(0xffffff,0x333344,1.2));
  const dl=new THREE.DirectionalLight(0xffffff,1.4); dl.position.set(3,8,2); scene.add(dl);
  scene.add(axisArrows());
  const gltf=await loader.loadAsync('/cars3d/'+file);
  let obj=gltf.scene;
  if(yaw){ const g=new THREE.Group(); g.add(obj); g.rotation.y=yaw*Math.PI/180; obj=g; }
  scene.add(fit(obj));
  renderer.render(scene,cam);
  return renderer.domElement.toDataURL('image/png');
}
const grid=document.getElementById('grid');
for(const item of MODELS){
  const [f, y] = item.split('@'); const yaw = parseFloat(y)||0;
  try{
    const url=await shoot(f, yaw);
    const t=document.createElement('div'); t.className='tile';
    t.innerHTML=`<img src="${url}"><div class="lbl"><b>${f}</b> yaw=${yaw}<br>nose should point to GREEN(+Z)</div>`;
    grid.appendChild(t);
  }catch(e){
    const t=document.createElement('div'); t.className='tile';
    t.innerHTML=`<div class="lbl" style="color:#f66"><b>${f}</b><br>ERR: ${e.message}</div>`;
    grid.appendChild(t);
  }
}
window.__done=true;
</script>
</body></html>
