<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 5-pointed star centred at origin, outer R=45, inner r=18 -->
    <polygon id="s" points="0,-45 10.6,-14.6 42.8,-13.9 17.1,5.6 26.5,36.4 0,18 -26.5,36.4 -17.1,5.6 -42.8,-13.9 -10.6,-14.6"/>
    <!-- Gold glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle crimson vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3a0000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a0000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="88" fill="url(#vignette)"/>

  <!-- 5 wanted stars, evenly spaced, vertically centred -->
  <g fill="#ffd700" filter="url(#glow)">
    <use href="#s" transform="translate(56,256)"/>
    <use href="#s" transform="translate(156,256)"/>
    <use href="#s" transform="translate(256,256)"/>
    <use href="#s" transform="translate(356,256)"/>
    <use href="#s" transform="translate(456,256)"/>
  </g>
</svg>
