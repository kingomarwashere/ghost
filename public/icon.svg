<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <polygon id="s" points="0,-22 5.2,-7.2 20.9,-6.8 8.5,2.8 12.9,17.8 0,8.9 -12.9,17.8 -8.5,2.8 -20.9,-6.8 -5.2,-7.2"/>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lightBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff7a0"/>
      <stop offset="30%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c8890a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ecfef" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6aaad4" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#160000" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#090909"/>
  <rect width="512" height="512" rx="88" fill="url(#vignette)"/>

  <!-- ── 5 Wanted Stars ─────────────────────────── -->
  <g fill="#ffd700" filter="url(#starGlow)">
    <use href="#s" transform="translate(56,55)"/>
    <use href="#s" transform="translate(156,55)"/>
    <use href="#s" transform="translate(256,55)"/>
    <use href="#s" transform="translate(356,55)"/>
    <use href="#s" transform="translate(456,55)"/>
  </g>

  <!-- ── Police Car (shifted up 87px from original) ── -->

  <!-- Ground shadow -->
  <ellipse cx="256" cy="397" rx="196" ry="8" fill="#000" opacity="0.45"/>

  <!-- Wheels (behind body) -->
  <circle cx="148" cy="345" r="46" fill="#141414"/>
  <circle cx="148" cy="345" r="27" fill="#2a2a2a"/>
  <circle cx="148" cy="345" r="11" fill="#777"/>
  <circle cx="370" cy="345" r="46" fill="#141414"/>
  <circle cx="370" cy="345" r="27" fill="#2a2a2a"/>
  <circle cx="370" cy="345" r="11" fill="#777"/>

  <!-- Car body -->
  <rect x="38" y="221" width="436" height="114" rx="22" fill="#e9e9e9"/>
  <!-- Blue NSW stripe -->
  <rect x="38" y="253" width="436" height="40" fill="#1c3784"/>
  <!-- Wheel arch cut-outs -->
  <circle cx="148" cy="335" r="52" fill="#e9e9e9"/>
  <circle cx="370" cy="335" r="52" fill="#e9e9e9"/>

  <!-- Headlight -->
  <rect x="458" y="241" width="16" height="30" rx="5" fill="#fffbe0"/>
  <rect x="458" y="241" width="16" height="30" rx="5" fill="#ffee88" opacity="0.6" filter="url(#lightBloom)"/>
  <!-- Front bumper -->
  <rect x="454" y="283" width="22" height="16" rx="4" fill="#bbb"/>
  <!-- Grille -->
  <rect x="456" y="265" width="18" height="18" rx="3" fill="#888"/>

  <!-- Taillight -->
  <rect x="38" y="241" width="12" height="28" rx="4" fill="#cc2200"/>
  <rect x="38" y="241" width="12" height="28" rx="4" fill="#ff3311" opacity="0.5" filter="url(#lightBloom)"/>

  <!-- Cabin -->
  <rect x="128" y="153" width="256" height="74" rx="14" fill="#1c3784"/>
  <!-- Windows -->
  <rect x="138" y="161" width="236" height="60" rx="9" fill="url(#glass)"/>
  <!-- A-pillar -->
  <rect x="320" y="161" width="8" height="60" fill="#1c3784"/>
  <!-- B-pillar -->
  <rect x="192" y="161" width="7" height="60" fill="#1c3784"/>

  <!-- Light bar housing -->
  <rect x="144" y="139" width="224" height="20" rx="7" fill="#111"/>
  <!-- Bloom glow -->
  <rect x="150" y="142" width="48" height="11" rx="3" fill="#ff2020" opacity="0.7" filter="url(#lightBloom)"/>
  <rect x="208" y="142" width="48" height="11" rx="3" fill="#2255ff" opacity="0.7" filter="url(#lightBloom)"/>
  <rect x="256" y="142" width="48" height="11" rx="3" fill="#ff2020" opacity="0.7" filter="url(#lightBloom)"/>
  <rect x="314" y="142" width="48" height="11" rx="3" fill="#2255ff" opacity="0.7" filter="url(#lightBloom)"/>
  <!-- Actual lights -->
  <rect x="150" y="142" width="48" height="11" rx="3" fill="#ff3030"/>
  <rect x="208" y="142" width="48" height="11" rx="3" fill="#3b6eff"/>
  <rect x="256" y="142" width="48" height="11" rx="3" fill="#ff3030"/>
  <rect x="314" y="142" width="48" height="11" rx="3" fill="#3b6eff"/>

  <!-- ── Ghost face on blue stripe ───────────────── -->
  <g transform="translate(256,273)">
    <!-- Body -->
    <path d="M-22,-22 a22,22 0 0,1 44,0 l0,30 q-7,9 -14,0 q-8,9 -16,0 q-7,9 -14,0 l0,-30 z"
          fill="white" opacity="0.95" stroke="#8ac8f0" stroke-width="1.2"/>
    <!-- Eyes -->
    <ellipse cx="-8" cy="-5" rx="6" ry="7" fill="#0d1a4a"/>
    <ellipse cx="8"  cy="-5" rx="6" ry="7" fill="#0d1a4a"/>
    <!-- Glints -->
    <circle cx="-5" cy="-8" r="2"   fill="white"/>
    <circle cx="11" cy="-8" r="2"   fill="white"/>
  </g>

  <!-- ── GTA GHOST text ─────────────────────────── -->
  <!-- 3D shadow -->
  <text x="259" y="488"
        font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78"
        fill="#5a3500" text-anchor="middle"
        textLength="448" lengthAdjust="spacingAndGlyphs">GHOST</text>
  <!-- Black outline -->
  <text x="256" y="485"
        font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78"
        fill="none" stroke="#000" stroke-width="12" stroke-linejoin="round"
        text-anchor="middle" textLength="448" lengthAdjust="spacingAndGlyphs">GHOST</text>
  <!-- Gold fill -->
  <text x="256" y="485"
        font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="78"
        fill="url(#goldGrad)" text-anchor="middle"
        textLength="448" lengthAdjust="spacingAndGlyphs"
        filter="url(#textGlow)">GHOST</text>
</svg>
